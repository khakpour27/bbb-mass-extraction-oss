<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBB Mass Extraction</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #dde1e6;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --success: #16a34a;
    --text: #1e293b;
    --text-muted: #64748b;
    --log-bg: #0f172a;
    --log-text: #e2e8f0;
    --log-error: #f87171;
    --log-warn: #fbbf24;
    --log-dim: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 18px; font-weight: 600; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #elapsed-time {
    font-size: 13px;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    color: var(--text-muted);
  }

  .status-badge {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
  }

  .status-idle { background: #e2e8f0; color: #475569; }
  .status-running { background: #dbeafe; color: #1d4ed8; }
  .status-done { background: #dcfce7; color: #166534; }
  .status-error { background: #fee2e2; color: #991b1b; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-running { animation: pulse 1.5s ease-in-out infinite; }

  .heartbeat {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
    margin-right: 4px;
    vertical-align: middle;
  }

  .heartbeat.alive { background: var(--success); animation: pulse 1s infinite; }
  .heartbeat.dead { background: var(--danger); }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 16px;
    padding: 16px 24px;
    max-width: 1400px;
    margin: 0 auto;
    height: calc(100vh - 56px);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  /* -- Left column: Config -- */
  .left-col {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .config-group h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .config-field {
    display: flex;
    flex-direction: column;
    margin-bottom: 8px;
  }

  .config-field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .config-field input, .config-field select {
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    width: 100%;
  }

  .config-field input:focus, .config-field select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
  }

  .config-field input.modified {
    border-color: var(--primary);
    background: #eff6ff;
  }

  .config-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* -- Right column -- */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .mode-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: white;
    cursor: pointer;
  }

  .legacy-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .legacy-badge.available { background: #dcfce7; color: #166534; }
  .legacy-badge.unavailable { background: #fee2e2; color: #991b1b; }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-danger:disabled { background: #fca5a5; cursor: not-allowed; }

  .btn-secondary { background: #e2e8f0; color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }

  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .btn-publish { background: #7c3aed; color: white; }
  .btn-publish:hover { background: #6d28d9; }

  /* -- Progress -- */
  .progress-section { display: flex; flex-direction: column; gap: 6px; }

  .progress-bar-outer {
    height: 22px;
    background: #e2e8f0;
    border-radius: 11px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    border-radius: 11px;
    transition: width 0.4s ease;
    width: 0%;
    position: relative;
  }

  .progress-bar-inner.complete {
    background: linear-gradient(90deg, #22c55e, #16a34a);
  }

  .progress-bar-inner.has-error {
    background: linear-gradient(90deg, #f87171, #dc2626);
  }

  .progress-bar-inner.legacy {
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-step-text {
    font-weight: 500;
    color: var(--text);
  }

  .dual-progress { display: none; flex-direction: column; gap: 8px; }
  .dual-progress.active { display: flex; }

  .progress-pipeline-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  /* -- Comparison panel -- */
  .comparison-panel { display: none; }
  .comparison-panel.active { display: block; }

  .comparison-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .comp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  }

  .comp-table th {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 2px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .comp-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }

  .comp-table .pct-green { color: #16a34a; }
  .comp-table .pct-yellow { color: #d97706; }
  .comp-table .pct-red { color: #dc2626; }

  .time-bars {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }

  .time-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .time-bar-label { width: 80px; text-align: right; color: var(--text-muted); }

  .time-bar-container {
    flex: 1;
    height: 18px;
    background: #e2e8f0;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .time-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
  }

  .time-bar-fill.oss { background: #3b82f6; }
  .time-bar-fill.legacy { background: #a78bfa; }

  .time-bar-value { width: 60px; font-size: 11px; color: var(--text-muted); }

  .raster-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .raster-stat {
    text-align: center;
    padding: 8px;
    background: var(--bg);
    border-radius: 6px;
  }

  .raster-stat .value { font-size: 18px; font-weight: 600; }
  .raster-stat .label { font-size: 11px; color: var(--text-muted); }

  /* -- Log viewer -- */
  .log-viewer {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .log-header {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .log-count {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
  }

  #log-output {
    flex: 1;
    background: var(--log-bg);
    color: var(--log-text);
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 12px;
    border-radius: 6px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 200px;
  }

  #log-output .log-error { color: var(--log-error); font-weight: 500; }
  #log-output .log-warning { color: var(--log-warn); }
  #log-output .log-dim { color: var(--log-dim); }
  #log-output .log-file { color: #67e8f9; }
  #log-output .log-metric { color: #a5f3fc; }
  #log-output .log-success { color: #4ade80; }
  #log-output .log-legacy { color: #c4b5fd; }
  #log-output .log-line {
    padding: 1px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  /* -- Past runs -- */
  .past-runs {
    max-height: 200px;
    overflow-y: auto;
  }

  .past-runs h3 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .run-entry {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .run-entry:last-child { border-bottom: none; }

  .run-entry .run-name { font-weight: 500; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }

  .run-entry .run-files {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .run-entry .run-files a {
    color: var(--primary);
    text-decoration: none;
    font-size: 12px;
  }

  .run-entry .run-files a:hover { text-decoration: underline; }

  .badge-sm {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-benchmark { background: #ddd6fe; color: #5b21b6; }
  .badge-oss { background: #dbeafe; color: #1d4ed8; }
  .badge-legacy { background: #fce7f3; color: #9d174d; }
</style>
</head>
<body>

<header>
  <h1>BBB Mass Extraction Pipeline</h1>
  <div class="header-right">
    <span id="elapsed-time"></span>
    <span class="heartbeat" id="heartbeat"></span>
    <span id="legacy-badge" class="legacy-badge unavailable">Legacy: checking...</span>
    <span id="status-badge" class="status-badge status-idle">Idle</span>
  </div>
</header>

<div class="layout">
  <!-- Left column: Configuration -->
  <div class="left-col">
    <div class="card">
      <div class="config-actions">
        <button class="btn-primary btn-sm" onclick="saveConfig()">Save Config</button>
        <button class="btn-secondary btn-sm" onclick="applyPreset('test')">Test Preset</button>
        <button class="btn-secondary btn-sm" onclick="applyPreset('prod')">Prod Preset</button>
        <button class="btn-secondary btn-sm" onclick="resetConfig()">Reset Defaults</button>
      </div>
    </div>

    <div id="config-form" class="card">
      <p style="color: var(--text-muted); font-size: 13px;">Loading config...</p>
    </div>
  </div>

  <!-- Right column: Controls + Logs + Results -->
  <div class="right-col">
    <div class="card">
      <div class="controls">
        <select id="mode-select" class="mode-select">
          <option value="oss">OSS Only</option>
          <option value="legacy">Legacy Only</option>
          <option value="benchmark">Both (Benchmark)</option>
        </select>
        <button id="btn-run" class="btn-primary" onclick="startRun()">Run Pipeline</button>
        <button id="btn-stop" class="btn-danger" onclick="stopRun()" disabled>Stop</button>
      </div>
    </div>

    <div class="card progress-section">
      <div class="progress-label">
        <span id="progress-step" class="progress-step-text">Ready</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-outer">
        <div id="progress-bar" class="progress-bar-inner"></div>
      </div>

      <!-- Dual progress bars for benchmark mode -->
      <div id="dual-progress" class="dual-progress">
        <div>
          <div class="progress-pipeline-label">OSS Pipeline</div>
          <div class="progress-bar-outer">
            <div id="progress-bar-oss" class="progress-bar-inner"></div>
          </div>
        </div>
        <div>
          <div class="progress-pipeline-label">Legacy Pipeline</div>
          <div class="progress-bar-outer">
            <div id="progress-bar-legacy" class="progress-bar-inner legacy"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Comparison panel (shown after benchmark) -->
    <div id="comparison-panel" class="card comparison-panel">
      <h3>Benchmark Comparison</h3>
      <div id="comparison-content"></div>
    </div>

    <div class="card log-viewer">
      <div class="log-header">
        <div class="log-header-left">
          Live Logs
          <span id="log-count" class="log-count"></span>
        </div>
        <button class="btn-secondary btn-sm" onclick="clearLogs()">Clear</button>
      </div>
      <div id="log-output"></div>
    </div>

    <div class="card past-runs">
      <h3>Past Runs</h3>
      <div id="past-runs-list">
        <p style="color: var(--text-muted); font-size: 13px;">Loading...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // -- State --
  let configDefaults = {};
  let configValues = {};
  let configGroups = {};
  let configTypes = {};
  let evtSource = null;
  let autoScroll = true;
  let pipelineStartedAt = null;
  let elapsedTimer = null;
  let logLineCount = 0;
  let lastLogTime = null;
  let legacyAvailable = false;
  let publishAvailable = false;
  let currentMode = "oss";

  // -- Config --

  async function loadConfig() {
    const res = await fetch("/api/config");
    const data = await res.json();
    configValues = data.values;
    configDefaults = { ...data.values };
    configGroups = data.groups;
    configTypes = data.types;
    renderConfigForm();
  }

  function renderConfigForm() {
    const container = document.getElementById("config-form");
    let html = "";
    for (const [group, keys] of Object.entries(configGroups)) {
      html += `<div class="config-group"><h3>${group}</h3>`;
      for (const key of keys) {
        const val = configValues[key] ?? "";
        const type = configTypes[key] === "number" || configTypes[key] === "integer"
          ? "number" : "text";
        const step = configTypes[key] === "number" ? "any" : "";
        html += `
          <div class="config-field">
            <label for="cfg-${key}">${key}</label>
            <input id="cfg-${key}" type="${type}" ${step ? 'step="' + step + '"' : ""}
                   value="${escHtml(String(val))}"
                   data-key="${key}"
                   data-default="${escHtml(String(val))}"
                   oninput="markModified(this)">
          </div>`;
      }
      html += "</div>";
    }
    container.innerHTML = html;
  }

  function markModified(input) {
    const def = input.dataset.default;
    if (input.value !== def) {
      input.classList.add("modified");
    } else {
      input.classList.remove("modified");
    }
  }

  async function saveConfig() {
    const values = {};
    document.querySelectorAll("#config-form input[data-key]").forEach(input => {
      values[input.dataset.key] = input.value;
    });
    const res = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ values }),
    });
    const data = await res.json();
    if (data.ok) {
      configValues = data.config;
      document.querySelectorAll("#config-form input[data-key]").forEach(input => {
        input.dataset.default = String(configValues[input.dataset.key] ?? "");
        input.value = input.dataset.default;
        input.classList.remove("modified");
      });
      appendLog("INFO", "Config saved.");
    }
  }

  async function applyPreset(name) {
    const res = await fetch(`/api/config/preset/${name}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) {
      configValues = data.config;
      renderConfigForm();
      appendLog("INFO", `Applied "${name}" preset.`);
    }
  }

  async function resetConfig() {
    const res = await fetch("/api/config/reset", { method: "POST" });
    const data = await res.json();
    if (data.ok) {
      configValues = data.config;
      renderConfigForm();
      appendLog("INFO", "Config reset to defaults.");
    }
  }

  // -- Legacy availability --

  async function checkLegacy() {
    try {
      const res = await fetch("/api/legacy/available");
      const data = await res.json();
      legacyAvailable = data.available;
      publishAvailable = data.publish_available;
      const badge = document.getElementById("legacy-badge");
      if (legacyAvailable) {
        badge.textContent = "Legacy: Available";
        badge.className = "legacy-badge available";
      } else {
        badge.textContent = "Legacy: Not Found";
        badge.className = "legacy-badge unavailable";
      }
      updateModeOptions();
    } catch (e) {
      // ignore
    }
  }

  function updateModeOptions() {
    const select = document.getElementById("mode-select");
    for (const opt of select.options) {
      if (opt.value === "legacy" || opt.value === "benchmark") {
        opt.disabled = !legacyAvailable;
        if (!legacyAvailable) {
          opt.textContent = opt.value === "legacy"
            ? "Legacy Only (unavailable)"
            : "Both (Benchmark) (unavailable)";
        }
      }
    }
  }

  // -- Pipeline control --

  async function startRun() {
    const mode = document.getElementById("mode-select").value;
    currentMode = mode;

    // Show dual progress for benchmark
    const dualProgress = document.getElementById("dual-progress");
    dualProgress.classList.toggle("active", mode === "benchmark");

    const res = await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode }),
    });
    const data = await res.json();
    if (res.ok) {
      appendLog("INFO", `Pipeline started in ${mode} mode.`);
      setRunning(true);
      startElapsedTimer();
      connectSSE();
    } else {
      appendLog("ERROR", data.error || "Failed to start");
    }
  }

  async function stopRun() {
    const res = await fetch("/api/stop", { method: "POST" });
    const data = await res.json();
    if (res.ok) {
      appendLog("WARNING", "Stop signal sent. Pipeline will halt after current step.");
    } else {
      appendLog("ERROR", data.error || "Failed to stop");
    }
  }

  function setRunning(running) {
    document.getElementById("btn-run").disabled = running;
    document.getElementById("btn-stop").disabled = !running;
    document.getElementById("mode-select").disabled = running;
  }

  // -- Elapsed timer --

  function startElapsedTimer() {
    pipelineStartedAt = Date.now();
    if (elapsedTimer) clearInterval(elapsedTimer);
    updateElapsed();
    elapsedTimer = setInterval(updateElapsed, 1000);
  }

  function stopElapsedTimer() {
    if (elapsedTimer) {
      clearInterval(elapsedTimer);
      elapsedTimer = null;
    }
  }

  function updateElapsed() {
    if (!pipelineStartedAt) return;
    const dt = Math.floor((Date.now() - pipelineStartedAt) / 1000);
    const m = Math.floor(dt / 60);
    const s = dt % 60;
    const str = m > 0 ? `${m}m ${s.toString().padStart(2, "0")}s` : `${s}s`;
    document.getElementById("elapsed-time").textContent = str;
  }

  // -- SSE --

  function connectSSE() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource("/api/logs");

    evtSource.addEventListener("log", (e) => {
      const data = JSON.parse(e.data);
      appendLog(data.level, data.message);
      lastLogTime = Date.now();
      updateHeartbeat(true);
    });

    evtSource.addEventListener("progress", (e) => {
      const data = JSON.parse(e.data);
      updateProgress(data.step, data.pct);
      lastLogTime = Date.now();
      updateHeartbeat(true);
    });

    evtSource.addEventListener("status", (e) => {
      const data = JSON.parse(e.data);
      updateStatusBadge(data);

      if (data.running && data.started_at && !pipelineStartedAt) {
        pipelineStartedAt = data.started_at * 1000;
        startElapsedTimer();
      }

      if (!data.running) {
        setRunning(false);
        stopElapsedTimer();
        if (data.error) {
          updateProgress("Error: " + data.error, data.progress_pct);
          document.getElementById("progress-bar").classList.add("has-error");
        }
        updateHeartbeat(false);
        loadResults();

        // Load benchmark comparison if applicable
        if (data.output_folder && currentMode === "benchmark") {
          const runName = data.output_folder.split(/[\/\\]/).pop();
          loadBenchmarkComparison(runName);
        }

        setTimeout(() => {
          if (evtSource) { evtSource.close(); evtSource = null; }
        }, 2000);
      }
    });

    evtSource.onerror = () => {
      updateHeartbeat(false);
      setTimeout(async () => {
        try {
          const res = await fetch("/api/status");
          const status = await res.json();
          if (status.running) {
            connectSSE();
          } else {
            setRunning(false);
            stopElapsedTimer();
            if (evtSource) { evtSource.close(); evtSource = null; }
          }
        } catch (e) {
          // Server unreachable
        }
      }, 2000);
    };
  }

  // -- Heartbeat --

  function updateHeartbeat(alive) {
    const hb = document.getElementById("heartbeat");
    hb.classList.remove("alive", "dead");
    if (alive) hb.classList.add("alive");
  }

  setInterval(() => {
    const hb = document.getElementById("heartbeat");
    if (lastLogTime && (Date.now() - lastLogTime > 10000)) {
      hb.classList.remove("alive");
      hb.classList.add("dead");
    }
  }, 3000);

  // -- Progress --

  function updateProgress(step, pct) {
    const bar = document.getElementById("progress-bar");
    const stepEl = document.getElementById("progress-step");
    const pctEl = document.getElementById("progress-pct");

    bar.style.width = pct + "%";
    bar.classList.remove("complete", "has-error");
    if (pct >= 100) bar.classList.add("complete");

    stepEl.textContent = step;
    pctEl.textContent = pct + "%";

    // Update dual progress bars for benchmark mode
    if (currentMode === "benchmark") {
      if (step.includes("[OSS]")) {
        document.getElementById("progress-bar-oss").style.width = (pct * 2) + "%";
      } else if (step.includes("[LEGACY]")) {
        document.getElementById("progress-bar-legacy").style.width = ((pct - 50) * 2) + "%";
      }
    }
  }

  function updateStatusBadge(status) {
    const badge = document.getElementById("status-badge");
    badge.classList.remove("status-idle", "status-running", "status-done", "status-error");
    if (status.running) {
      badge.textContent = `Running (${status.mode || "oss"})`;
      badge.classList.add("status-running");
    } else if (status.error) {
      badge.textContent = "Error";
      badge.classList.add("status-error");
    } else if (status.progress_pct >= 100) {
      badge.textContent = "Complete";
      badge.classList.add("status-done");
    } else {
      badge.textContent = "Idle";
      badge.classList.add("status-idle");
    }
  }

  // -- Benchmark comparison --

  async function loadBenchmarkComparison(runName) {
    try {
      const res = await fetch(`/api/benchmark/${runName}`);
      if (!res.ok) return;
      const data = await res.json();
      renderComparison(data, runName);
    } catch (e) {
      // ignore
    }
  }

  function renderComparison(data, runName) {
    const panel = document.getElementById("comparison-panel");
    const content = document.getElementById("comparison-content");
    panel.classList.add("active");

    let html = "";

    // Time comparison
    const ossTime = data.oss?.total_time_s || 0;
    const legacyTime = data.legacy?.total_time_s || 0;
    const maxTime = Math.max(ossTime, legacyTime, 1);
    const timeRatio = data.comparison?.time_ratio;

    html += `<h4 style="margin-bottom:8px">Runtime${timeRatio ? ` (ratio: ${timeRatio.toFixed(2)}x)` : ""}</h4>`;
    html += `<div class="time-bars">`;
    html += `<div class="time-bar-row">
      <div class="time-bar-label">OSS</div>
      <div class="time-bar-container"><div class="time-bar-fill oss" style="width:${(ossTime/maxTime*100).toFixed(1)}%"></div></div>
      <div class="time-bar-value">${formatTime(ossTime)}</div>
    </div>`;
    html += `<div class="time-bar-row">
      <div class="time-bar-label">Legacy</div>
      <div class="time-bar-container"><div class="time-bar-fill legacy" style="width:${(legacyTime/maxTime*100).toFixed(1)}%"></div></div>
      <div class="time-bar-value">${formatTime(legacyTime)}</div>
    </div>`;
    html += `</div>`;

    // Volume comparison table
    const volDiffs = data.comparison?.volume_diffs;
    if (volDiffs && Object.keys(volDiffs).length > 0) {
      html += `<h4 style="margin:12px 0 8px">Volume Comparison</h4>`;
      html += `<table class="comp-table">
        <thead><tr><th>Metric</th><th>OSS</th><th>Legacy</th><th>Diff</th><th>% Diff</th></tr></thead><tbody>`;
      for (const [key, v] of Object.entries(volDiffs)) {
        const pctCls = v.pct_diff < 1 ? "pct-green" : v.pct_diff < 5 ? "pct-yellow" : "pct-red";
        html += `<tr>
          <td>${escHtml(key)}</td>
          <td>${v.oss.toFixed(2)}</td>
          <td>${v.legacy.toFixed(2)}</td>
          <td>${v.diff.toFixed(2)}</td>
          <td class="${pctCls}">${v.pct_diff.toFixed(2)}%</td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    // Raster diff stats
    const rd = data.comparison?.raster_diff;
    if (rd) {
      html += `<h4 style="margin:12px 0 8px">Raster Precision</h4>`;
      html += `<div class="raster-stats">
        <div class="raster-stat"><div class="value">${rd.mean_abs_m.toFixed(3)}</div><div class="label">Mean Abs (m)</div></div>
        <div class="raster-stat"><div class="value">${rd.pct_within_1cm.toFixed(1)}%</div><div class="label">Within 1cm</div></div>
        <div class="raster-stat"><div class="value">${rd.pct_within_10cm.toFixed(1)}%</div><div class="label">Within 10cm</div></div>
      </div>`;
      html += `<div style="margin-top:8px"><a href="/api/benchmark/${encodeURIComponent(runName)}/diff_raster" class="btn-secondary btn-sm" style="text-decoration:none;display:inline-block">Download Diff Raster</a></div>`;
    }

    content.innerHTML = html;
  }

  function formatTime(seconds) {
    if (seconds < 60) return seconds.toFixed(1) + "s";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}m ${s}s`;
  }

  // -- Log viewer --

  function appendLog(level, message) {
    const el = document.getElementById("log-output");

    const lines = message.split("\n");
    for (const lineText of lines) {
      if (!lineText.trim()) continue;

      const line = document.createElement("div");
      line.className = "log-line";
      const ts = new Date().toLocaleTimeString("en-GB", { hour12: false });

      let cls = "";
      if (level === "ERROR") cls = "log-error";
      else if (level === "WARNING") cls = "log-warning";
      else if (lineText.includes("[LEGACY]") || lineText.includes("[PUBLISH]")) cls = "log-legacy";
      else if (lineText.includes("complete") || lineText.includes("Complete") || lineText.includes("done")) cls = "log-success";
      else if (lineText.match(/\d+x\d+|m[^a-z]|pixels|cells|meshes|volume|\.tif|\.xlsx/i)) cls = "log-metric";
      else if (lineText.match(/\.(ifc|xml|tif|gpkg)/i)) cls = "log-file";

      if (cls) line.classList.add(cls);

      line.innerHTML = `<span class="log-dim">${ts}</span> ${escHtml(lineText)}`;
      el.appendChild(line);
      logLineCount++;
    }

    document.getElementById("log-count").textContent = `${logLineCount} lines`;

    if (autoScroll) {
      el.scrollTop = el.scrollHeight;
    }
  }

  function clearLogs() {
    document.getElementById("log-output").innerHTML = "";
    logLineCount = 0;
    document.getElementById("log-count").textContent = "";
  }

  document.addEventListener("DOMContentLoaded", () => {
    const logEl = document.getElementById("log-output");
    logEl.addEventListener("scroll", () => {
      autoScroll = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 30;
    });
  });

  // -- Past runs --

  async function loadResults() {
    const res = await fetch("/api/results");
    const data = await res.json();
    const container = document.getElementById("past-runs-list");

    if (!data.results || data.results.length === 0) {
      container.innerHTML = '<p style="color: var(--text-muted); font-size: 13px;">No past runs found.</p>';
      return;
    }

    let html = "";
    for (const run of data.results) {
      html += `<div class="run-entry">
        <div class="run-name">
          ${escHtml(run.name)}`;

      if (run.has_benchmark) html += ` <span class="badge-sm badge-benchmark">Benchmark</span>`;
      if (run.has_oss) html += ` <span class="badge-sm badge-oss">OSS</span>`;
      if (run.has_legacy) html += ` <span class="badge-sm badge-legacy">Legacy</span>`;

      html += `</div><div class="run-files">`;
      for (const file of run.files) {
        html += `<a href="/api/results/${encodeURIComponent(run.name)}/${encodeURIComponent(file)}"
                    target="_blank">${escHtml(file)}</a>`;
      }

      // Benchmark view button
      if (run.has_benchmark) {
        html += ` <button class="btn-secondary btn-sm" onclick="loadBenchmarkComparison('${escHtml(run.name)}')">View Comparison</button>`;
      }

      // Publish button (only when legacy available and run has legacy output)
      if (publishAvailable && run.has_legacy) {
        html += ` <button class="btn-publish btn-sm" onclick="publishRun('${escHtml(run.name)}')">Publish to AGOL</button>`;
      }

      html += `</div></div>`;
    }
    container.innerHTML = html;
  }

  async function publishRun(runName) {
    if (!confirm(`Publish "${runName}" to AGOL?`)) return;
    appendLog("INFO", `Publishing ${runName} to AGOL...`);
    try {
      const res = await fetch(`/api/publish/${encodeURIComponent(runName)}`, { method: "POST" });
      const data = await res.json();
      if (data.success) {
        appendLog("INFO", `Published successfully in ${formatTime(data.total_time_s)}`);
      } else {
        appendLog("ERROR", `Publish failed: ${data.error || "Unknown error"}`);
      }
    } catch (e) {
      appendLog("ERROR", `Publish error: ${e.message}`);
    }
  }

  // -- Utilities --

  function escHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  // -- Init --

  async function init() {
    await loadConfig();
    await loadResults();
    await checkLegacy();

    const res = await fetch("/api/status");
    const status = await res.json();
    if (status.running) {
      currentMode = status.mode || "oss";
      setRunning(true);
      updateProgress(status.step, status.progress_pct);
      updateStatusBadge(status);
      if (status.started_at) {
        pipelineStartedAt = status.started_at * 1000;
        startElapsedTimer();
      }
      // Show dual progress for benchmark
      document.getElementById("dual-progress").classList.toggle("active", currentMode === "benchmark");
      connectSSE();
    }
  }

  init();
</script>
</body>
</html>
